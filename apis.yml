aid: sonoco-products
name: Sonoco Products
description: >-
  Sonoco Products Company is a global leader in sustainable metal and fiber consumer
  and industrial packaging, operating 285 facilities across 40 countries with 23,000+
  employees. Products include metal packaging (aerosol cans, steel food cans, closures),
  rigid paper packaging (paper containers, fiber cartridges), industrial paper packaging
  (tubes, cores, recycled paperboard), and industrial specialty packaging (plastic
  components, reels, spools). Serves food and beverage, pet care, household products,
  beauty, automotive, and industrial markets. A Fortune 500 company (NYSE: SON).
